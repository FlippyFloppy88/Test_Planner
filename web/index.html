<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="test_planner">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Test Planner</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // ── File System Access API helpers ──────────────────────────────────────
    // Called from Dart via dart:js_interop to pick a folder and read/write
    // files using the Chrome File System Access API.

    let _dirHandle = null;

    // Opens the native folder picker. Returns the folder name, or null on cancel.
    window.pickDataFolder = async function() {
      try {
        _dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        return _dirHandle.name;
      } catch (e) {
        // User cancelled or browser doesn't support it
        return null;
      }
    };

    // Returns the name of the currently held directory handle, or null.
    window.getDataFolderName = function() {
      return _dirHandle ? _dirHandle.name : null;
    };

    // Writes text content to a file in the selected folder.
    window.writeFolderFile = async function(fileName, content) {
      if (!_dirHandle) return false;
      try {
        const fh = await _dirHandle.getFileHandle(fileName, { create: true });
        const writable = await fh.createWritable();
        await writable.write(content);
        await writable.close();
        return true;
      } catch(e) { return false; }
    };

    // Reads text content from a file in the selected folder.
    // Returns null if the file doesn't exist.
    window.readFolderFile = async function(fileName) {
      if (!_dirHandle) return null;
      try {
        const fh = await _dirHandle.getFileHandle(fileName);
        const file = await fh.getFile();
        return await file.text();
      } catch(e) { return null; }
    };

    // Writes binary (base64-encoded) content to a file in the selected folder.
    window.writeFolderFileBytes = async function(fileName, base64) {
      if (!_dirHandle) return false;
      try {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        const fh = await _dirHandle.getFileHandle(fileName, { create: true });
        const writable = await fh.createWritable();
        await writable.write(bytes.buffer);
        await writable.close();
        return true;
      } catch(e) { return false; }
    };

    // Triggers a browser download for bytes (fallback when no folder selected).
    window.downloadBytes = function(base64, fileName) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const blob = new Blob([bytes]);
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = fileName; a.click();
      URL.revokeObjectURL(url);
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
