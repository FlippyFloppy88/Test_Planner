name: test_planner
description: "A Flutter Test Planning and Execution application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Data / Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.4.2

  # Rich text editing
  flutter_quill: ^11.5.0

  # File picking and saving (web compatible)
  file_picker: ^8.1.2
  path_provider: ^2.1.3
  path: ^1.9.0

  # Excel export/import
  excel: ^4.0.6

  # Drag and drop reordering
  reorderables: ^0.6.0

  # Utility
  collection: ^1.18.0
  url_launcher: ^6.3.0
  equatable: ^2.0.5
  shared_preferences: ^2.3.2
  mime: ^1.0.5

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  macos_secure_bookmarks: ^0.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
